services:
  postgres:
    image: postgres:16-alpine
    container_name: shamela_postgres
    environment:
      POSTGRES_USER: shamela
      POSTGRES_PASSWORD: shamela
      POSTGRES_DB: shamela
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
